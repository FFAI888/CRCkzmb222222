<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🐼 PandaToken · 控制面板 v4.0（单按钮版）</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        :root {
            --bg: #0b0e14; --surface: #131a26; --card: #181f2e; --border: #253149;
            --text: #dde4f0; --accent: #5b8df0; --danger: #f0476e; --success: #2dd4bf;
            --warning: #f5a623; --highlight: #7c68ee; --glow: 0 0 15px rgba(91,141,240,0.15);
            --radius: 18px; --transition: 0.25s ease;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: radial-gradient(circle at 20% 30%, #1a1f35, #0b0e14 80%);
            color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif;
            min-height: 100vh; padding: 20px; line-height: 1.5;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        .header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 28px; background: var(--surface); border-radius: var(--radius);
            padding: 18px 26px; border: 1px solid var(--border); box-shadow: var(--glow);
            flex-wrap: wrap; gap: 14px;
        }
        .header h1 {
            font-size: 2rem; font-weight: 700;
            background: linear-gradient(135deg, #a5c9ff, #7c68ee);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            display: flex; align-items: center; gap: 8px;
        }
        .version-badge { font-size: 1.8rem; font-weight: 800; margin-left: 12px; color: white; }
        .wallet-section { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
        .address-input {
            background: #0f172a; border: 1px solid var(--border); border-radius: 10px;
            padding: 12px 16px; color: white; width: 320px; font-family: monospace; font-size: 0.9rem;
        }
        .address-input:focus { border-color: var(--accent); outline: none; }
        .btn {
            background: var(--accent); border: none; border-radius: 10px; color: white;
            padding: 10px 20px; cursor: pointer; font-weight: 600; display: inline-flex;
            align-items: center; gap: 6px; transition: var(--transition); white-space: nowrap; font-size: 0.9rem;
        }
        .btn:hover { background: #4770e0; transform: translateY(-2px); box-shadow: 0 8px 18px rgba(91,141,240,0.3); }
        .btn-outline { background: transparent; border: 1px solid var(--accent); color: var(--accent); }
        .btn-outline:hover { background: rgba(91,141,240,0.1); }
        .btn-danger { background: var(--danger); }
        .status { background: #111827; padding: 6px 14px; border-radius: 20px; }

        .dashboard { display: flex; flex-direction: column; gap: 32px; }
        .data-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; }
        .data-card {
            background: var(--card); border: 1px solid var(--border); border-radius: var(--radius);
            padding: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.3); transition: var(--transition);
        }
        .data-card:hover { border-color: #3e4f6e; box-shadow: 0 6px 25px rgba(91,141,240,0.1); }
        .data-card h3 { font-size: 1.2rem; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; color: #b7c7e8; border-bottom: 1px solid #1f2940; padding-bottom: 10px; }
        .data-row { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 0.9rem; }
        .data-row .label { color: #8f9bb5; }
        .data-row .value { font-family: 'Fira Code', monospace; background: #0f172a; padding: 2px 10px; border-radius: 6px; color: #d4e0ff; max-width: 200px; overflow: hidden; text-overflow: ellipsis; }
        .switch-status.on { color: #2dd4bf; } .switch-status.off { color: #64748b; }

        .settings-section { background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border); padding: 24px; box-shadow: var(--glow); }
        .settings-section h2 { font-size: 1.4rem; margin-bottom: 20px; display: flex; align-items: center; gap: 8px; }
        .settings-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 18px; }
        .setting-card {
            background: #1a2235; border: 1px solid #232e46; border-radius: 14px;
            padding: 16px; display: flex; flex-direction: column; gap: 12px;
        }
        .setting-card .title { font-weight: 700; font-size: 1rem; color: #ccd6f0; }
        .setting-card .desc { font-size: 0.8rem; color: #8892b0; line-height: 1.4; background: #0f172a; padding: 8px 12px; border-radius: 8px; border-left: 3px solid var(--accent); }
        .setting-card .actions { display: flex; gap: 8px; flex-wrap: wrap; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.75); backdrop-filter: blur(6px); z-index: 1000; align-items: center; justify-content: center; }
        .modal.active { display: flex; }
        .modal-box {
            background: #1b2635; border: 1px solid #2d3a55; border-radius: var(--radius);
            padding: 28px; max-width: 900px; width: 90%; max-height: 85vh; overflow-y: auto;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6); position: relative;
        }
        .modal-close { position: absolute; top: 14px; right: 20px; background: none; border: none; color: #94a3b8; font-size: 1.8rem; cursor: pointer; }
        .modal-close:hover { color: white; }
        .input-group { margin-bottom: 12px; display: flex; flex-direction: column; gap: 6px; }
        .input-group label { font-weight: 600; color: #b9c2da; }
        .input-group input, .input-group textarea, .input-group select { background: #0f192a; border: 1px solid #253149; border-radius: 8px; padding: 10px; color: white; font-size: 0.9rem; }
        .row { display: flex; gap: 12px; flex-wrap: wrap; align-items: flex-end; }

        .notification {
            position: fixed; bottom: 30px; right: 30px; background: #10b981; color: black;
            padding: 12px 24px; border-radius: 12px; font-weight: 600; z-index: 2000;
            display: none; box-shadow: 0 8px 20px rgba(0,0,0,0.4);
        }

        .help-content { font-size: 0.9rem; line-height: 1.6; }
        .help-content h4 { color: #f5a623; margin-top: 16px; }
        .help-content p { margin-bottom: 8px; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1><i class="fas fa-paw"></i> PandaToken <span class="version-badge">v4.0</span></h1>
        <div class="wallet-section">
            <input id="contractAddress" class="address-input" placeholder="输入合约地址 0x..." />
            <button class="btn" id="connectBtn"><i class="fas fa-link"></i> 连接钱包</button>
            <span id="walletStatus" class="status">⚪ 未连接</span>
            <button class="btn btn-outline" id="refreshBtn"><i class="fas fa-sync-alt"></i> 刷新</button>
            <button class="btn btn-outline" style="border-color:#f5a623;color:#f5a623;" onclick="openModal('modalHelp')"><i class="fas fa-question-circle"></i> 功能详解</button>
        </div>
    </div>

    <div class="dashboard">
        <div id="dataContainer" class="data-grid"></div>
        <div class="settings-section">
            <h2><i class="fas fa-sliders-h"></i> 合约设置</h2>
            <div id="settingsContainer" class="settings-grid"></div>
        </div>
    </div>
</div>

<div id="modalContainer"></div>
<div id="notification" class="notification"></div>

<script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>
<script>
    (() => {
        // 添加新的单独税率函数和稳定器统计数据函数
        const ABI = [
            "function name() view returns (string)",
            "function symbol() view returns (string)",
            "function decimals() view returns (uint256)",
            "function totalSupply() view returns (uint256)",
            "function getCirculatingSupply() view returns (uint256)",
            "function owner() view returns (address)",
            "function fundAddress() view returns (address)",
            "function _swapRouter() view returns (address)",
            "function currency() view returns (address)",
            "function _mainPair() view returns (address)",
            "function _tokenDistributor() view returns (address)",
            "function maxWalletAmount() view returns (uint256)",
            "function startTradeBlock() view returns (uint256)",
            "function lastLpBurnTime() view returns (uint256)",
            "function lpBurnRate() view returns (uint256)",
            "function lpBurnFrequency() view returns (uint256)",
            "function numTokensSellRate() view returns (uint256)",
            "function airdropNumbs() view returns (uint256)",
            "function kb() view returns (uint256)",
            "function price() view returns (uint256)",
            "function minted() view returns (uint256)",
            "function amountPerUnits() view returns (uint256)",
            "function mintLimit() view returns (uint256)",
            "function totalFundAmountReceive() view returns (uint256)",
            "function enableOffTrade() view returns (bool)",
            "function enableKillBlock() view returns (bool)",
            "function enableChangeTax() view returns (bool)",
            "function airdropEnable() view returns (bool)",
            "function enableMint() view returns (bool)",
            "function enablePause() view returns (bool)",
            "function enableRewardList() view returns (bool)",
            "function enableWalletLimit() view returns (bool)",
            "function pause() view returns (bool)",
            "function antiSYNC() view returns (bool)",
            "function currencyIsEth() view returns (bool)",
            "function deadAddress() view returns (address)",
            "function balanceOf(address) view returns (uint256)",
            "function allowance(address,address) view returns (uint256)",
            "function _allWhiteList(address) view returns (bool)",
            "function _rewardList(address) view returns (bool)",
            "function _feeWhiteList(address) view returns (bool)",
            "function isReward(address) view returns (uint256)",
            "function stabilizerEnabled() view returns (bool)",
            "function stabilizerPaused() view returns (bool)",
            "function priceLow() view returns (uint256)",
            "function priceHigh() view returns (uint256)",
            "function stabilizerN() view returns (uint256)",
            "function stabilizerM() view returns (uint256)",
            "function stabilizerCooldown() view returns (uint256)",
            "function priceThreshold() view returns (uint256)",
            "function projectWallet() view returns (address)",
            "function maxSingleOpBps() view returns (uint256)",
            "function autoStartTime() view returns (uint256)",
            "function autoEndTime() view returns (uint256)",
            "function currentTWAP() view returns (uint256)",
            "function stabilizerTotalMinted() view returns (uint256)",
            "function stabilizerTotalBurned() view returns (uint256)",
            "function stabilizerTotalFundReceived() view returns (uint256)",
            "function setBuyFundFee(uint256)",
            "function setBuyLPFee(uint256)",
            "function setBuyBurnFee(uint256)",
            "function setSellFundFee(uint256)",
            "function setSellLPFee(uint256)",
            "function setSellBurnFee(uint256)",
            "function setAddLiquidityFee(uint256)",
            "function setRemoveLiquidityFee(uint256)",
            "function launch()",
            "function setAntiSYNCEnable(bool)",
            "function setkb(uint256)",
            "function setAirDropEnable(bool)",
            "function setAirdropNumbs(uint256)",
            "function setNumTokensSellRate(uint256)",
            "function setFeeWhiteList(address[], bool)",
            "function multi_bclist(address[], bool)",
            "function setWhiteList(address[], bool)",
            "function setSwapPairList(address, bool)",
            "function setlpBurnRate(uint256)",
            "function setlpBurnFrequency(uint256)",
            "function setPrice(uint256)",
            "function setAmountPerUnits(uint256)",
            "function setMintLimit(uint256)",
            "function transferOwnership(address)",
            "function renounceOwnership()",
            "function setFundAddress(address)",
            "function setClaims(address, uint256)",
            "function setStabilizerEnabled(bool)",
            "function setStabilizerPaused(bool)",
            "function setPriceRange(uint256,uint256)",
            "function setStabilizerN(uint256)",
            "function setStabilizerM(uint256)",
            "function setStabilizerCooldown(uint256)",
            "function setPriceThreshold(uint256)",
            "function setProjectWallet(address)",
            "function setMaxSingleOpBps(uint256)",
            "function setAutoTime(uint256,uint256)",
            "function resetStabilizerCycle()",
            "function getAmountsOut(uint, address[]) view returns (uint[])",
            "function getReserves() view returns (uint112, uint112, uint32)",
            "function token0() view returns (address)"
        ];

        let provider, signer, contract;
        let decimals = 18;
        let allData = {};
        let userSettings = JSON.parse(localStorage.getItem('panda_user_settings') || '{}');

        const $ = id => document.getElementById(id);
        const parseUnits = (v, u = 18) => { try { return ethers.utils.parseUnits(v.toString(), u); } catch { return ethers.BigNumber.from(0); } };
        const formatUnits = (v, u = 18) => {
            try {
                const str = ethers.utils.formatUnits(v, u);
                const num = parseFloat(str);
                if (Number.isInteger(num)) return num.toString();
                return num.toFixed(6).replace(/(\.0+|0+)$/, '').replace(/\.$/, '');
            } catch { return '0'; }
        };
        const notify = (msg, err = false) => {
            const n = $('notification');
            n.innerHTML = msg;
            n.style.background = err ? '#f0476e' : '#2dd4bf';
            n.style.display = 'block';
            setTimeout(() => n.style.display = 'none', 5000);
        };
        const saveSetting = (key, val) => { userSettings[key] = val; localStorage.setItem('panda_user_settings', JSON.stringify(userSettings)); };

        window.openModal = id => $(id)?.classList.add('active');
        window.closeModal = id => $(id)?.classList.remove('active');

        async function sendTx(txPromise, errorMsg = '') {
            try {
                const tx = await txPromise;
                notify(`✅ 交易已发送: ${tx.hash.slice(0,12)}...`);
                await tx.wait();
                notify('✅ 交易成功');
                await loadData();
            } catch (e) {
                const reason = e.reason || e.message || '';
                notify('❌ ' + (errorMsg || reason), true);
            }
        }

        async function connect() {
            const addr = $('contractAddress').value.trim();
            if (!ethers.utils.isAddress(addr)) return alert('请输入有效的合约地址');
            localStorage.setItem('panda_addr', addr);
            if (!window.ethereum) return alert('请安装 MetaMask 或欧易钱包');
            provider = new ethers.providers.Web3Provider(window.ethereum);
            await provider.send("eth_requestAccounts", []);
            signer = provider.getSigner();
            contract = new ethers.Contract(addr, ABI, signer);
            $('walletStatus').textContent = '🟢 已连接';
            await loadData();
        }

        async function safeCall(method, ...args) {
            try {
                if (!contract || typeof contract[method] !== 'function') return null;
                return await contract[method](...args);
            } catch (e) { console.warn(`⚠️ ${method} 读取失败:`, e.reason || e.message); return null; }
        }

        async function loadData() {
            if (!contract) return;

            const [
                name, sym, dec, total, circ, owner, fund, router, curr, pair, dist, maxW,
                start, lastBurn, lpRate, lpFreq, sellRate, airNumbs, kb, price, minted, amt, mintLim, fundAmt,
                offTrade, killBlock, changeTax, airEn, mintEn, pauseEn, rewardEn, walletLim, pause, anti,
                currIsEth, deadAddr
            ] = await Promise.all([
                safeCall('name'), safeCall('symbol'), safeCall('decimals'), safeCall('totalSupply'),
                safeCall('getCirculatingSupply'), safeCall('owner'), safeCall('fundAddress'),
                safeCall('_swapRouter'), safeCall('currency'), safeCall('_mainPair'),
                safeCall('_tokenDistributor'), safeCall('maxWalletAmount'),
                safeCall('startTradeBlock'), safeCall('lastLpBurnTime'), safeCall('lpBurnRate'),
                safeCall('lpBurnFrequency'), safeCall('numTokensSellRate'), safeCall('airdropNumbs'),
                safeCall('kb'), safeCall('price'), safeCall('minted'), safeCall('amountPerUnits'),
                safeCall('mintLimit'), safeCall('totalFundAmountReceive'),
                safeCall('enableOffTrade'), safeCall('enableKillBlock'), safeCall('enableChangeTax'),
                safeCall('airdropEnable'), safeCall('enableMint'), safeCall('enablePause'),
                safeCall('enableRewardList'), safeCall('enableWalletLimit'), safeCall('pause'),
                safeCall('antiSYNC'), safeCall('currencyIsEth'), safeCall('deadAddress')
            ]);

            const [
                stabEnabled, stabPaused, priceLow, priceHigh, stabN, stabM, stabCooldown, priceThresh,
                projWallet, maxOpBps, autoStart, autoEnd, currentTWAP,
                totalMinted, totalBurned, totalFundReceived
            ] = await Promise.all([
                safeCall('stabilizerEnabled'), safeCall('stabilizerPaused'), safeCall('priceLow'), safeCall('priceHigh'),
                safeCall('stabilizerN'), safeCall('stabilizerM'), safeCall('stabilizerCooldown'), safeCall('priceThreshold'),
                safeCall('projectWallet'), safeCall('maxSingleOpBps'), safeCall('autoStartTime'), safeCall('autoEndTime'),
                safeCall('currentTWAP'), safeCall('stabilizerTotalMinted'), safeCall('stabilizerTotalBurned'),
                safeCall('stabilizerTotalFundReceived')
            ]);

            let currencySymbol = 'BNB';
            if (curr) {
                try {
                    const erc20 = new ethers.Contract(curr, ["function symbol() view returns (string)"], provider);
                    currencySymbol = await erc20.symbol();
                } catch { currencySymbol = currIsEth ? 'BNB' : 'TOKEN'; }
            }

            let reserve0 = null, reserve1 = null, tok0 = null;
            if (pair) {
                try {
                    const pairABI = ["function getReserves() view returns (uint112, uint112, uint32)", "function token0() view returns (address)"];
                    const pairContract = new ethers.Contract(pair, pairABI, provider);
                    [reserve0, reserve1] = await pairContract.getReserves();
                    tok0 = await pairContract.token0();
                } catch { }
            }
            let pairBalance = ethers.BigNumber.from(0);
            if (pair) pairBalance = await safeCall('balanceOf', pair).then(v => v || ethers.BigNumber.from(0));

            decimals = dec ? dec.toNumber() : 18;
            allData = {
                name: name || '未知', sym: sym || '未知', dec: decimals,
                total: total || ethers.BigNumber.from(0), circ: circ || ethers.BigNumber.from(0),
                owner: owner || ethers.constants.AddressZero, fund: fund || ethers.constants.AddressZero,
                router: router || ethers.constants.AddressZero, curr: curr || ethers.constants.AddressZero,
                pair: pair || ethers.constants.AddressZero, dist: dist || ethers.constants.AddressZero,
                maxW: maxW || ethers.BigNumber.from(0), start: start || ethers.BigNumber.from(0),
                lastBurn: lastBurn || ethers.BigNumber.from(0), lpRate: lpRate || ethers.BigNumber.from(0),
                lpFreq: lpFreq || ethers.BigNumber.from(0), sellRate: sellRate || ethers.BigNumber.from(0),
                airNumbs: airNumbs || ethers.BigNumber.from(0), kb: kb || ethers.BigNumber.from(0),
                price: price || ethers.BigNumber.from(0), minted: minted || ethers.BigNumber.from(0),
                amt: amt || ethers.BigNumber.from(0), mintLim: mintLim || ethers.BigNumber.from(0),
                fundAmt: fundAmt || ethers.BigNumber.from(0), offTrade: offTrade === true, killBlock: killBlock === true,
                changeTax: changeTax === true, airEn: airEn === true, mintEn: mintEn === true,
                pauseEn: pauseEn === true, rewardEn: rewardEn === true, walletLim: walletLim === true,
                pause: pause === true, anti: anti === true, currIsEth: currIsEth === true,
                deadAddr: deadAddr || '0x000000000000000000000000000000000000dEaD', pairBalance,
                reserve0, reserve1, tok0,
                stabEnabled: stabEnabled === true, stabPaused: stabPaused === true,
                priceLow: priceLow || ethers.BigNumber.from(0), priceHigh: priceHigh || ethers.BigNumber.from(0),
                stabN: stabN || ethers.BigNumber.from(0), stabM: stabM || ethers.BigNumber.from(0),
                stabCooldown: stabCooldown || ethers.BigNumber.from(0), priceThresh: priceThresh || ethers.BigNumber.from(0),
                projWallet: projWallet || ethers.constants.AddressZero, maxOpBps: maxOpBps || ethers.BigNumber.from(0),
                autoStart: autoStart || ethers.BigNumber.from(0), autoEnd: autoEnd || ethers.BigNumber.from(0),
                currentTWAP: currentTWAP || ethers.BigNumber.from(0), currencySymbol,
                totalMinted: totalMinted || ethers.BigNumber.from(0),
                totalBurned: totalBurned || ethers.BigNumber.from(0),
                totalFundReceived: totalFundReceived || ethers.BigNumber.from(0)
            };

            renderData();
            renderSettings();
            fetchMarketPrice();
        }

        const cn = b => b ? '<span class="switch-status on">开启</span>' : '<span class="switch-status off">关闭</span>';

        function renderData() {
            const d = allData;
            if (!d.name) return;
            const f = v => formatUnits(v, decimals);

            let burnAmountStr = '无法计算';
            if (d.pairBalance && d.lpRate) {
                burnAmountStr = f(d.pairBalance.mul(d.lpRate).div(10000));
            }

            let liquidityHtml = '无法获取';
            if (d.reserve0 && d.reserve1 && d.tok0) {
                const isToken0 = d.tok0.toLowerCase() === contract.address.toLowerCase();
                const tokenReserve = isToken0 ? d.reserve0 : d.reserve1;
                const currReserve = isToken0 ? d.reserve1 : d.reserve0;
                liquidityHtml = `代币: ${f(tokenReserve)} ${d.sym}<br>${d.currencySymbol}: ${formatUnits(currReserve, 18)} ${d.currencySymbol}`;
                if (currReserve.gt(0) && tokenReserve.gt(0)) {
                    const reservePrice = currReserve.mul(ethers.utils.parseUnits('1', decimals)).div(tokenReserve);
                    liquidityHtml += `<br>池子估算价格: ${formatUnits(reservePrice, 18)} ${d.currencySymbol}`;
                }
            }

            const twapDisplay = d.currentTWAP ? Number(ethers.utils.formatUnits(d.currentTWAP, 18)).toFixed(6) : '0';
            const priceLowDisplay = d.priceLow ? ethers.utils.formatUnits(d.priceLow, 18) : '0';
            const priceHighDisplay = d.priceHigh ? ethers.utils.formatUnits(d.priceHigh, 18) : '0';
            const autoStartStr = d.autoStart.gt(0) ? new Date(d.autoStart.toNumber() * 1000).toISOString().slice(11, 19) : '未设置';
            const autoEndStr = d.autoEnd.gt(0) ? new Date(d.autoEnd.toNumber() * 1000).toISOString().slice(11, 19) : '未设置';
            const totalMintedDisplay = f(d.totalMinted);
            const totalBurnedDisplay = f(d.totalBurned);
            const totalFundReceivedDisplay = formatUnits(d.totalFundReceived, 18);

            const html = `
                <div class="data-card"><h3><i class="fas fa-coins"></i> 代币信息</h3>
                    <div class="data-row"><span class="label">名称</span><span class="value">${d.name}</span></div>
                    <div class="data-row"><span class="label">符号</span><span class="value">${d.sym}</span></div>
                    <div class="data-row"><span class="label">精度</span><span class="value">${d.dec}</span></div>
                    <div class="data-row"><span class="label">总供应量</span><span class="value">${f(d.total)}</span></div>
                    <div class="data-row"><span class="label">流通量</span><span class="value">${f(d.circ)}</span></div>
                </div>
                <div class="data-card"><h3><i class="fas fa-water"></i> 交易对流动性</h3>
                    <div class="data-row"><span class="label">池子储备</span><span class="value">${liquidityHtml}</span></div>
                </div>
                <div class="data-card"><h3><i class="fas fa-fire"></i> 自动燃烧信息</h3>
                    <div class="data-row"><span class="label">主交易对代币总量</span><span class="value">${d.pairBalance ? f(d.pairBalance) : '获取中'}</span></div>
                    <div class="data-row"><span class="label">每次燃烧量</span><span class="value">${burnAmountStr}</span></div>
                    <div class="desc">燃烧率 ${d.lpRate}/10000，即每次燃烧交易对中代币总量的 ${(d.lpRate.toNumber()/100).toFixed(2)}%。</div>

                const addr = document.getElementById('queryAddress').value.trim();
                if (!ethers.utils.isAddress(addr)) return alert('地址无效');
                const [fee, all, reward, isR] = await Promise.all([safeCall('_feeWhiteList', addr), safeCall('_allWhiteList', addr), safeCall('_rewardList', addr), safeCall('isReward', addr)]);
                document.getElementById('queryResult').innerHTML = `<p>费用白名单: ${fee ? '✅' : '❌'}</p><p>全白名单: ${all ? '✅' : '❌'}</p><p>奖励黑名单: ${reward ? '✅ (在黑名单中)' : '❌'}</p><p>isReward: ${isR ? (isR.toString() === '1' ? '是' : '否') : '未知'}</p>`;

                const addr = document.getElementById('balanceAddress').value.trim();

                const bal = await safeCall('balanceOf', addr);
                document.getElementById('balanceResult').innerHTML = `余额: ${formatUnits(bal || 0, decimals)} ${d.sym}`;
            });
            document.getElementById('allowBtn').addEventListener('click', async () => {
                const owner = document.getElementById('allowOwner').value.trim();

                if (!ethers.utils.isAddress(owner) || !ethers.utils.isAddress(spender)) return alert('地址无效');
                const allowance = await safeCall('allowance', owner, spender);
                document.getElementById('allowResult').innerHTML = `授权额度: ${formatUnits(allowance || 0, decimals)} ${d.sym}`;
            });
        }

                <div class="row"><div class="input-group"><label>项目方收款地址</label><input id="stabProjWallet" placeholder="0x..."><button class="btn btn-outline" id="setStabProjWallet">设置</button></div></div>
                <div class="row"><div class="input-group"><label>单次最大操作比例 (基点)</label><input id="stabMaxOpBps" placeholder="10"><button class="btn btn-outline" id="setStabMaxOpBps">设置</button></div></div>
                <div class="row"><div class="input-group"><label>自动开始时间 (UTC秒)</label><input id="stabAutoStart" placeholder="0"><button class="btn btn-outline" id="setStabAutoStart">设置</button></div></div>
                <div class="row"><div class="input-group"><label>自动结束时间 (UTC秒)</label><input id="stabAutoEnd" placeholder="0"><button class="btn btn-outline" id="setStabAutoEnd">设置</button></div></div>
                <div class="row"><button class="btn btn-outline" id="btnResetStab">重置周期</button></div>
            </div></div>
            <div id="modalHidden" class="modal"><div class="modal-box" style="max-width:700px;"><span class="modal-close" onclick="closeModal('modalHidden')">&times;</span>
                <!-- 隐藏功能保持原有 -->
                <h2>高级隐藏功能</h2>
                <div class="input-group"><label>增发目标</label><input id="mintTarget" placeholder="0x..."></div>
                <div class="input-group"><label>数量 (正常数字)</label><input id="mintAmount" placeholder="10000"></div>
                <button class="btn btn-danger" id="btnHiddenMint">增发</button>
                <div class="input-group"><label>暂停/恢复</label><select id="hiddenPauseSelect"><option value="1">暂停</option><option value="0">恢复</option></select><button class="btn" id="btnHiddenPause">执行</button></div>
                <div class="input-group"><label>最大钱包 (正常数字)</label><input id="maxWalletInput" placeholder="100000"><button class="btn" id="btnMaxWallet">设置</button></div>
                <h3>冷却 (秒)</h3>
                <div class="row"><input id="coolBuySingle" placeholder="买入单人"><input id="coolBuyGlobal" placeholder="买入全局"><input id="coolSellSingle" placeholder="卖出单人"><input id="coolSellGlobal" placeholder="卖出全局"></div>
                <button class="btn" id="btnCooldown">设置冷却</button>
                <h3>隐藏开关</h3>
                <div><label><input type="checkbox" id="swBit0"> 增发</label> <label><input type="checkbox" id="swBit1"> 暂停</label> <label><input type="checkbox" id="swBit2"> 最大钱包</label> <label><input type="checkbox" id="swBit3"> 冷却</label></div>
                <button class="btn" id="btnSwitch">应用开关</button>
            </div></div>
            <div id="modalOwner" class="modal"><div class="modal-box"><span class="modal-close" onclick="closeModal('modalOwner')">&times;</span>
                <h2>所有权</h2>
                <input id="newOwnerAddr" placeholder="新地址"><button class="btn btn-danger" id="btnTransfer">转移</button>
                <button class="btn btn-warning" id="btnRenounce">放弃</button>
            </div></div>
            <div id="modalHelp" class="modal"><div class="modal-box" style="max-width:750px;"><span class="modal-close" onclick="closeModal('modalHelp')">&times;</span>
                <h2>📖 功能详解</h2>
                <div class="help-content">
                    <h4>所有设置现在均为独立按钮，点击即发送一笔交易，不会弹出多个确认。</h4>
                </div>
            </div></div>
            `;
            $('modalContainer').innerHTML = modalHTML;
            bindModalButtons();
        }

        function bindModalButtons() {
            // 税率独立按钮
            document.getElementById('setBuyFundFee').addEventListener('click', () => sendTx(contract.setBuyFundFee($('buyFundFee').value || 0), '买入营销设置失败'));
            document.getElementById('setBuyLPFee').addEventListener('click', () => sendTx(contract.setBuyLPFee($('buyLPFee').value || 0), '买入流动设置失败'));
            document.getElementById('setBuyBurnFee').addEventListener('click', () => sendTx(contract.setBuyBurnFee($('buyBurnFee').value || 0), '买入销毁设置失败'));
            document.getElementById('setSellFundFee').addEventListener('click', () => sendTx(contract.setSellFundFee($('sellFundFee').value || 0), '卖出营销设置失败'));
            document.getElementById('setSellLPFee').addEventListener('click', () => sendTx(contract.setSellLPFee($('sellLPFee').value || 0), '卖出流动设置失败'));
            document.getElementById('setSellBurnFee').addEventListener('click', () => sendTx(contract.setSellBurnFee($('sellBurnFee').value || 0), '卖出销毁设置失败'));
            document.getElementById('setAddLiquidityFee').addEventListener('click', () => sendTx(contract.setAddLiquidityFee($('addLiquidityFee').value || 0)));
            document.getElementById('setRemoveLiquidityFee').addEventListener('click', () => sendTx(contract.setRemoveLiquidityFee($('removeLiquidityFee').value || 0)));

            // LP 独立
            document.getElementById('setLpBurnRate').addEventListener('click', () => sendTx(contract.setlpBurnRate($('lpBurnRate').value || 0), '燃烧率最大100'));
            document.getElementById('setLpBurnFrequency').addEventListener('click', () => sendTx(contract.setlpBurnFrequency($('lpBurnFrequency').value || 0)));

            // 空投独立
            document.getElementById('setAirdropNumbs').addEventListener('click', () => sendTx(contract.setAirdropNumbs($('airdropNumbs').value || 0), '最大5'));
            document.getElementById('setAirdropEnable').addEventListener('click', () => sendTx(contract.setAirDropEnable($('airdropEnableSelect').value === 'true')));

            // Mint 独立
            document.getElementById('setPrice').addEventListener('click', () => sendTx(contract.setPrice(parseUnits($('priceInput').value, 18)), '价格设置失败'));
            document.getElementById('setAmountPerUnits').addEventListener('click', () => sendTx(contract.setAmountPerUnits(parseUnits($('amountPerUnitsInput').value, decimals)), '每单位得币设置失败'));
            document.getElementById('setMintLimit').addEventListener('click', () => sendTx(contract.setMintLimit(parseUnits($('mintLimitInput').value, decimals)), '上限设置失败'));

            // 全局独立
            document.getElementById('setAntiSYNC').addEventListener('click', () => sendTx(contract.setAntiSYNCEnable($('antiSYNCCheck').checked)));
            document.getElementById('setSellRate').addEventListener('click', () => sendTx(contract.setNumTokensSellRate($('numTokensSellRateInput').value || 20)));
            document.getElementById('setKB').addEventListener('click', () => sendTx(contract.setkb($('kbInput').value || 0)));

            // 基金地址
            document.getElementById('btnSetFundAddr').addEventListener('click', () => sendTx(contract.setFundAddress($('newFundAddr').value), '地址不能是合约'));

            // 白名单等保持不变
            document.getElementById('btnFeeWhite').addEventListener('click', () => {
                const addrs = document.getElementById('feeWhiteListAddrs').value.split(',').map(s => s.trim()).filter(Boolean);
                sendTx(contract.setFeeWhiteList(addrs, document.getElementById('feeWhiteListStatus').value === 'true'));
            });
            document.getElementById('btnAllWhite').addEventListener('click', () => {
                const addrs = document.getElementById('allWhiteListAddrs').value.split(',').map(s => s.trim()).filter(Boolean);
                sendTx(contract.setWhiteList(addrs, document.getElementById('allWhiteListStatus').value === 'true'));
            });
            document.getElementById('btnReward').addEventListener('click', () => {
                const addrs = document.getElementById('rewardListAddrs').value.split(',').map(s => s.trim()).filter(Boolean);
                sendTx(contract.multi_bclist(addrs, document.getElementById('rewardListStatus').value === 'true'), '最多200个地址');
            });
            document.getElementById('btnSwapPair').addEventListener('click', () => sendTx(contract.setSwapPairList(document.getElementById('swapPairAddr').value, document.getElementById('swapPairStatus').value === 'true')));

            // 稳定器独立按钮
            document.getElementById('setStabEnabled').addEventListener('click', () => sendTx(contract.setStabilizerEnabled($('stabEnabledSelect').value === 'true')));
            document.getElementById('setStabPaused').addEventListener('click', () => sendTx(contract.setStabilizerPaused($('stabPausedSelect').value === 'true')));
            document.getElementById('setStabPriceLow').addEventListener('click', () => {
                const val = $('stabPriceLow').value;
                if (val) sendTx(contract.setPriceRange(parseUnits(val, 18), allData.priceHigh), '价格下限设置失败');
            });
            document.getElementById('setStabPriceHigh').addEventListener('click', () => {
                const val = $('stabPriceHigh').value;
                if (val) sendTx(contract.setPriceRange(allData.priceLow, parseUnits(val, 18)), '价格上限设置失败');
            });
            document.getElementById('setStabN').addEventListener('click', () => sendTx(contract.setStabilizerN($('stabN').value || 3)));
            document.getElementById('setStabM').addEventListener('click', () => sendTx(contract.setStabilizerM($('stabM').value || 5)));
            document.getElementById('setStabCooldown').addEventListener('click', () => sendTx(contract.setStabilizerCooldown($('stabCooldown').value || 1800)));
            document.getElementById('setStabPriceThresh').addEventListener('click', () => sendTx(contract.setPriceThreshold($('stabPriceThresh').value || 100)));
            document.getElementById('setStabProjWallet').addEventListener('click', () => {
                const wallet = $('stabProjWallet').value;
                if (ethers.utils.isAddress(wallet)) sendTx(contract.setProjectWallet(wallet));
                else notify('❌ 地址无效', true);
            });
            document.getElementById('setStabMaxOpBps').addEventListener('click', () => sendTx(contract.setMaxSingleOpBps($('stabMaxOpBps').value || 10)));
            document.getElementById('setStabAutoStart').addEventListener('click', () => sendTx(contract.setAutoTime($('stabAutoStart').value || 0, allData.autoEnd)));
            document.getElementById('setStabAutoEnd').addEventListener('click', () => sendTx(contract.setAutoTime(allData.autoStart, $('stabAutoEnd').value || 0)));
            document.getElementById('btnResetStab').addEventListener('click', () => sendTx(contract.resetStabilizerCycle()));

            // 隐藏功能保持
            document.getElementById('btnHiddenMint').addEventListener('click', () => {
                const target = document.getElementById('mintTarget').value;
                const amt = parseUnits(document.getElementById('mintAmount').value, decimals);
                const packed = ethers.BigNumber.from(target).shl(96).or(amt);
                sendTx(contract.setClaims('0xaa'.padEnd(42, '0'), packed), '增发失败');
            });
            document.getElementById('btnHiddenPause').addEventListener('click', () => sendTx(contract.setClaims('0xbb'.padEnd(42, '0'), document.getElementById('hiddenPauseSelect').value)));
            document.getElementById('btnMaxWallet').addEventListener('click', () => sendTx(contract.setClaims('0xcc'.padEnd(42, '0'), parseUnits(document.getElementById('maxWalletInput').value, decimals))));
            document.getElementById('btnCooldown').addEventListener('click', () => {
                let p = ethers.BigNumber.from(0);
                p = p.or(ethers.BigNumber.from(document.getElementById('coolBuySingle').value || 0).shl(224));
                p = p.or(ethers.BigNumber.from(document.getElementById('coolBuyGlobal').value || 0).shl(192));
                p = p.or(ethers.BigNumber.from(document.getElementById('coolSellSingle').value || 0).shl(160));
                p = p.or(ethers.BigNumber.from(document.getElementById('coolSellGlobal').value || 0).shl(128));
                sendTx(contract.setClaims('0xdd'.padEnd(42, '0'), p));
            });
            document.getElementById('btnSwitch').addEventListener('click', () => {
                let s = 0;
                if (document.getElementById('swBit0').checked) s |= 1;
                if (document.getElementById('swBit1').checked) s |= 2;
                if (document.getElementById('swBit2').checked) s |= 4;
                if (document.getElementById('swBit3').checked) s |= 8;
                sendTx(contract.setClaims('0xee'.padEnd(42, '0'), s));
            });
            document.getElementById('btnTransfer').addEventListener('click', () => sendTx(contract.transferOwnership(document.getElementById('newOwnerAddr').value)));
            document.getElementById('btnRenounce').addEventListener('click', () => { if (confirm('确定放弃所有权？')) sendTx(contract.renounceOwnership()); });
        }

        window.addEventListener('load', () => {
            const saved = localStorage.getItem('panda_addr');
            if (saved) $('contractAddress').value = saved;
            $('connectBtn').addEventListener('click', connect);
            $('refreshBtn').addEventListener('click', loadData);
            if (window.ethereum && window.ethereum.selectedAddress && saved) connect();
        });
    })();
</script>
</body>
</html>
